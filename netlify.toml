# Combined web deploy
[build]
  command = "npm run netlify:build"
  publish = "Web"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/livequiz/api/*"
  to = "/.netlify/functions/livequiz-api?path=:splat"
  status = 200
  force = true

[[redirects]]
  from = "/medquiz/quiz"
  to = "/medquiz/quiz.html"
  status = 200

[[redirects]]
  from = "/medquiz/quota"
  to = "/medquiz/quota.html"
  status = 200

[[redirects]]
  from = "/medquiz/complete"
  to = "/medquiz/complete.html"
  status = 200
