<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Participant | LiveQuiz Classroom</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=20260622">
    <link rel="alternate icon" type="image/png" href="../favicon.png?v=20260622">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png?v=20260622">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="participant">
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <strong>LiveQuiz Classroom</strong>
          <span id="participantMeta">Participant</span>
        </div>
        <a href="index.html">Leave screen</a>
      </header>

      <section class="panel">
        <div class="split">
          <div>
            <h2 id="participantTitle">Connecting</h2>
            <p id="participantStatus" class="status">Restoring your session...</p>
          </div>
          <span id="participantTimer" class="timer">--</span>
        </div>

        <div id="participantQuestion"></div>
        <div id="participantChoices" class="choices"></div>
        <div id="participantReveal"></div>
      </section>
    </main>
    <script>
      (function checkEmbed() {
        if (window.location.search.includes('embed=1')) {
          document.body.classList.add('is-embedded');
          // Propagate embed=1 to local links
          const observer = new MutationObserver(() => {
            document.querySelectorAll('a').forEach(link => {
              const href = link.getAttribute('href');
              if (href && !href.startsWith('http') && !href.startsWith('//') && !href.startsWith('../') && !href.includes('embed=1')) {
                const url = new URL(href, window.location.href);
                url.searchParams.set('embed', '1');
                link.setAttribute('href', url.pathname + url.search + url.hash);
              }
            });
          });
          observer.observe(document.body, { childList: true, subtree: true });
        }
      })();
    </script>
    <script src="livequiz.js"></script>
  </body>
</html>
