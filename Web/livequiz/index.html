<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveQuiz Classroom</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <strong>LiveQuiz Classroom</strong>
          <span>Ad-hoc host-paced MCQ rooms</span>
        </div>
        <a href="../index.html">Teaching home</a>
      </header>

      <section class="grid participant-entry">
        <div class="panel">
          <h2>Join as participant</h2>
          <p class="lede">Enter the room code and a unique username. Refreshes from the same browser will restore your session.</p>
          <form id="joinRoomForm" class="form">
            <label>
              Room code
              <input id="joinCode" autocomplete="one-time-code" inputmode="numeric" />
            </label>
            <label>
              Username
              <input id="joinUsername" autocomplete="name" />
            </label>
            <button type="submit">Join room</button>
            <p id="joinStatus" class="status"></p>
          </form>
        </div>
      </section>
    </main>
    <script src="livequiz.js"></script>
  </body>
</html>
