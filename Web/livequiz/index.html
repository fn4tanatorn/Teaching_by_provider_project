<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveQuiz Classroom</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=20260622">
    <link rel="alternate icon" type="image/png" href="../favicon.png?v=20260622">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png?v=20260622">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <strong>LiveQuiz</strong>
          <span>Participant entry</span>
        </div>
        <a href="../index.html" class="nav-btn">Home</a>
      </header>

      <section class="grid participant-entry entry-hero">
        <div class="panel entry-card">
          <p class="eyebrow">Student access</p>
          <h1 class="entry-title">Join a live classroom quiz</h1>
          <p class="lede">Use the room code from your instructor. Keep the same username if you refresh or reconnect.</p>
          <form id="joinRoomForm" class="form">
            <label>
              Room code
              <input id="joinCode" class="room-code-input" autocomplete="one-time-code" inputmode="numeric" maxlength="6" />
            </label>
            <label>
              Username
              <input id="joinUsername" autocomplete="name" />
            </label>
            <button type="submit">Join room</button>
            <p id="joinStatus" class="status"></p>
          </form>
        </div>
      </section>
    </main>
    <script>
      (function checkEmbed() {
        if (window.location.search.includes('embed=1')) {
          document.body.classList.add('is-embedded');
          // Propagate embed=1 to local links
          const observer = new MutationObserver(() => {
            document.querySelectorAll('a').forEach(link => {
              const href = link.getAttribute('href');
              if (href && !href.startsWith('http') && !href.startsWith('//') && !href.startsWith('../') && !href.includes('embed=1')) {
                const url = new URL(href, window.location.href);
                url.searchParams.set('embed', '1');
                link.setAttribute('href', url.pathname + url.search + url.hash);
              }
            });
          });
          observer.observe(document.body, { childList: true, subtree: true });
        }
      })();
    </script>
    <script src="livequiz.js"></script>
  </body>
</html>
