<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacology Decks — TeachingByProvider</title>
    <meta name="description" content="Katzung Pharmacology web slide decks สำหรับนักศึกษาแพทย์ — เลือกบทเรียนเป็น deck แยก พร้อม keyboard navigation">
    <meta name="theme-color" content="#030000">
    <link rel="stylesheet" href="css/theme.css?v=20260614-hub-search-resume">
    <style>
        /* ============================================================
           Hub top navigation — consistent with MedQuiz nav.css
           Self-contained so it works on the dark deck theme.
        ============================================================ */
        .hub-nav {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            padding: 0.7rem clamp(1rem, 4vw, 2.5rem);
            background: rgba(8, 6, 10, 0.72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hub-nav-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .hub-nav-brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(145deg, #6ee7b7 0%, #10b981 55%, #047857 100%);
            color: #fff;
            box-shadow: 0 6px 18px rgba(16, 185, 129, 0.35);
        }

        .hub-nav-brand-icon svg {
            width: 18px;
            height: 18px;
        }

        .hub-nav-brand-text {
            font-size: 1rem;
        }

        .hub-nav-toggle {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 44px;
            height: 44px;
            padding: 0;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 12px;
            cursor: pointer;
        }

        .hub-nav-toggle span {
            display: block;
            width: 20px;
            height: 2px;
            margin: 0 auto;
            background: #fff;
            border-radius: 2px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .hub-nav-links {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .hub-nav-links a {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 0.9rem;
            border-radius: 999px;
            color: rgba(255, 255, 255, 0.82);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .hub-nav-links a:hover,
        .hub-nav-links a:focus-visible {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            outline: none;
        }

        .hub-nav-links a[aria-current="page"] {
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            color: #fff;
        }

        @media (max-width: 640px) {
            .hub-nav-toggle {
                display: flex;
            }

            .hub-nav-links {
                flex-basis: 100%;
                flex-direction: column;
                align-items: stretch;
                gap: 0.25rem;
                max-height: 0;
                overflow: hidden;
                opacity: 0;
                transition: max-height 0.25s ease, opacity 0.2s ease;
            }

            .hub-nav-links.open {
                max-height: 320px;
                opacity: 1;
                margin-top: 0.5rem;
            }

            .hub-nav-links a {
                width: 100%;
                padding: 0.7rem 0.9rem;
            }
        }

        /* Skip link for keyboard / screen-reader users */
        .hub-skip-link {
            position: absolute;
            left: -999px;
            top: 0;
            z-index: 100;
            padding: 0.6rem 1rem;
            background: #fff;
            color: #0f172a;
            border-radius: 0 0 10px 0;
            font-weight: 700;
        }

        .hub-skip-link:focus {
            left: 0;
        }
    </style>
</head>
<body class="hub-page">

    <a href="#deck-grid" class="hub-skip-link">ข้ามไปยังรายการบทเรียน</a>

    <div class="bg-layer" aria-hidden="true"></div>

    <nav class="hub-nav" aria-label="เมนูหลัก">
        <a href="../index.html" class="hub-nav-brand">
            <span class="hub-nav-brand-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </span>
            <span class="hub-nav-brand-text">Clinical Video</span>
        </a>
        <button class="hub-nav-toggle" id="hubNavToggle" type="button" aria-expanded="false" aria-controls="hubNavLinks" aria-label="เปิดเมนู">
            <span></span><span></span><span></span>
        </button>
        <ul class="hub-nav-links" id="hubNavLinks">
            <li><a href="../index.html">หน้าหลัก</a></li>
            <li><a href="../medquiz/index.html">MedQuiz</a></li>
            <li><a href="index.html" aria-current="page">Pharmacology Decks</a></li>
            <li><a href="../sheets/index.html">Sheets</a></li>
        </ul>
    </nav>

    <main class="hub">
        <header class="hub-header">
            <p class="hub-eyebrow">TeachingByProvider</p>
            <h1 class="hub-title">Katzung Pharmacology<br>Web Slide</h1>
            <p class="hub-tagline">เลือกบทที่ต้องการเรียน — แต่ละบทเป็น deck แยก พร้อม keyboard navigation</p>
        </header>

        <section class="hub-tools" aria-label="Deck tools">
            <div id="hub-resume-spotlight" class="hub-resume-spotlight" hidden></div>
            <label class="hub-search" for="deckSearchInput">
                <span class="hub-search-label">ค้นหาบทเรียน</span>
                <input id="deckSearchInput" type="search" placeholder="พิมพ์ชื่อบท, chapter หรือ keyword">
            </label>
            <div class="hub-filter-group" role="group" aria-label="ตัวกรองบทเรียน">
                <button class="hub-filter-chip is-active" type="button" data-filter="all">ทั้งหมด</button>
                <button class="hub-filter-chip" type="button" data-filter="resume">กำลังเรียน</button>
                <button class="hub-filter-chip" type="button" data-filter="short">บทสั้น</button>
                <button class="hub-filter-chip" type="button" data-filter="long">บทใหญ่</button>
            </div>
            <p id="deckSearchSummary" class="hub-search-summary">แสดงทุกบทเรียนทั้งหมด</p>
        </section>

        <nav class="deck-grid" id="deck-grid" aria-label="เลือกบทเรียน">
            <p class="hub-loading">กำลังโหลด...</p>
        </nav>
    </main>

    <script>
        (function initHubNav() {
            var toggle = document.getElementById("hubNavToggle");
            var links = document.getElementById("hubNavLinks");
            if (toggle && links) {
                toggle.addEventListener("click", function () {
                    var open = links.classList.toggle("open");
                    toggle.setAttribute("aria-expanded", open ? "true" : "false");
                    toggle.setAttribute("aria-label", open ? "ปิดเมนู" : "เปิดเมนู");
                });
            }
        })();

        (function initHub() {
            const grid = document.getElementById("deck-grid");
            const searchInput = document.getElementById("deckSearchInput");
            const searchSummary = document.getElementById("deckSearchSummary");
            const resumeSpotlight = document.getElementById("hub-resume-spotlight");
            const filterButtons = Array.from(document.querySelectorAll("[data-filter]"));
            const PROGRESS_KEY_PREFIX = "tbp.deckProgress.";
            let allDecks = [];
            let searchQuery = "";
            let activeFilter = "all";

            function readDeckProgress(deckId) {
                try {
                    const raw = localStorage.getItem(`${PROGRESS_KEY_PREFIX}${deckId}`);
                    if (!raw) return null;
                    return JSON.parse(raw);
                } catch {
                    return null;
                }
            }

            function escapeHtml(value) {
                return String(value ?? "").replace(/[&<>"']/g, function (ch) {
                    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch];
                });
            }

            function getDeckTokens(deck) {
                return [
                    deck.id,
                    `chapter ${deck.chapter}`,
                    `ch${deck.chapter}`,
                    deck.title,
                    deck.summary,
                ]
                    .join(" ")
                    .toLowerCase();
            }

            function hasResumeProgress(deck) {
                const progress = readDeckProgress(deck.id);
                return Boolean(
                    progress &&
                    Number.isInteger(progress.index) &&
                    progress.index > 0 &&
                    Number.isInteger(progress.totalSlides) &&
                    progress.totalSlides > 0
                );
            }

            function matchesFilter(deck) {
                if (activeFilter === "resume") return hasResumeProgress(deck);
                if (activeFilter === "short") return deck.sections <= 12;
                if (activeFilter === "long") return deck.sections >= 25;
                return true;
            }

            function filterLabel(filterKey) {
                if (filterKey === "resume") return "กำลังเรียน";
                if (filterKey === "short") return "บทสั้น";
                if (filterKey === "long") return "บทใหญ่";
                return "ทุกบทเรียน";
            }

            function getMostRecentProgressDeck(decks) {
                return decks
                    .map((deck) => ({ deck, progress: readDeckProgress(deck.id) }))
                    .filter(({ progress }) => progress && progress.updatedAt)
                    .sort((a, b) => new Date(b.progress.updatedAt).getTime() - new Date(a.progress.updatedAt).getTime())[0] || null;
            }

            function renderResumeSpotlight(record) {
                if (!record) {
                    resumeSpotlight.hidden = true;
                    resumeSpotlight.innerHTML = "";
                    return;
                }

                const { deck, progress } = record;
                const slideIndex = Number.isInteger(progress.index) ? progress.index + 1 : 1;
                const totalSlides = Number.isInteger(progress.totalSlides) ? progress.totalSlides : deck.sections;

                resumeSpotlight.hidden = false;
                resumeSpotlight.innerHTML = `
                    <a class="hub-resume-card" href="deck.html?deck=${encodeURIComponent(deck.id)}&resume=1">
                        <div class="hub-resume-copy">
                            <span class="hub-resume-kicker">Continue where you left off</span>
                            <h2>${escapeHtml(deck.title)}</h2>
                            <p>Chapter ${escapeHtml(deck.chapter)} · สไลด์ ${escapeHtml(slideIndex)}/${escapeHtml(totalSlides)}</p>
                        </div>
                        <span class="hub-resume-cta">เรียนต่อ →</span>
                    </a>`;
            }

            function renderDecks() {
                const query = searchQuery.trim().toLowerCase();
                const filtered = allDecks.filter((deck) => {
                    if (!matchesFilter(deck)) return false;
                    return query ? getDeckTokens(deck).includes(query) : true;
                });

                if (searchSummary) {
                    const baseSummary = query
                        ? `พบ ${filtered.length} บทจากคำค้นและตัวกรอง`
                        : `แสดง ${filterLabel(activeFilter)} ${filtered.length} บท`;
                    searchSummary.textContent = `${baseSummary} จากทั้งหมด ${allDecks.length} บท`;
                }

                if (!filtered.length) {
                    grid.innerHTML = '<p class="hub-loading">ไม่พบบทเรียนที่ตรงกับคำค้นหาหรือตัวกรองนี้</p>';
                    return;
                }

                grid.innerHTML = filtered
                    .map((deck) => {
                        const progress = readDeckProgress(deck.id);
                        const hasProgress = hasResumeProgress(deck);
                        const href = hasProgress
                            ? `deck.html?deck=${deck.id}&resume=1`
                            : `deck.html?deck=${deck.id}`;
                        const progressHtml = hasProgress
                            ? `<span class="deck-card-progress">เรียนถึงสไลด์ ${progress.index + 1}/${progress.totalSlides}</span>`
                            : "";
                        const cta = hasProgress ? "เรียนต่อ →" : "เปิดสไลด์ →";

                        return `
                        <a class="deck-card${hasProgress ? " deck-card--resume" : ""}" href="${href}">
                            <span class="deck-card-ch">Chapter ${deck.chapter}</span>
                            <h2 class="deck-card-title">${escapeHtml(deck.title)}</h2>
                            <p class="deck-card-summary">${escapeHtml(deck.summary)}</p>
                            <span class="deck-card-meta">${deck.sections} หัวข้อ${deck.hasImages ? " · มีรูประกอบ" : ""}</span>
                            ${progressHtml}
                            <span class="deck-card-cta">${cta}</span>
                        </a>`;
                    })
                    .join("");
            }

            fetch("data/manifest.json")
                .then((r) => {
                    if (!r.ok) throw new Error("manifest");
                    return r.json();
                })
                .then((manifest) => {
                    allDecks = Array.isArray(manifest.decks) ? manifest.decks : [];
                    renderResumeSpotlight(getMostRecentProgressDeck(allDecks));
                    renderDecks();
                })
                .catch(() => {
                    grid.innerHTML = `
                        <div class="deck-card deck-card--error">
                            <h2 class="deck-card-title">โหลดไม่สำเร็จ</h2>
                            <p class="deck-card-summary">เปิดผ่าน local server (python3 -m http.server) แล้วลองใหม่</p>
                        </div>`;
                });

            if (searchInput) {
                searchInput.addEventListener("input", function () {
                    searchQuery = searchInput.value || "";
                    renderDecks();
                });
            }

            filterButtons.forEach(function (button) {
                button.addEventListener("click", function () {
                    activeFilter = button.dataset.filter || "all";
                    filterButtons.forEach(function (candidate) {
                        candidate.classList.toggle("is-active", candidate === button);
                    });
                    renderDecks();
                });
            });
        })();
    </script>
</body>
</html>
